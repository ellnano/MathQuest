<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MathQuest</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="game">
    <section class="card topbar">
      <div class="brand">
        <div class="logo">MQ</div>
        <div>
          <h1>MathQuest</h1>
          <p>Ayo belajar matematika dengan seru!</p>
        </div>
      </div>

      <div class="mode-box">
        <label for="phase-select">Pilih Fase</label>
        <select id="phase-select" class="phase-select">
          <option value="phase1">Fase 1 (Kelas 1-3)</option>
          <option value="phase2">Fase 2 (Kelas 4-6)</option>
        </select>
      </div>

      <div class="status-group">
        <div class="status-box lives-box">
          <span>Nyawa</span>
          <strong id="lives-value">3</strong>
        </div>

        <div class="status-box score-box">
          <span>Koin</span>
          <strong id="score-value">120</strong>
        </div>
      </div>
    </section>

    <section class="card question-area">
      <div class="mascot-wrap">
        <div class="mascot" aria-hidden="true">
          <div class="star star-1"></div>
          <div class="star star-2"></div>
          <div class="accessory hat" data-accessory="wizard-hat"></div>
          <div class="accessory sword" data-accessory="knight-sword"></div>
          <div class="accessory wings" data-accessory="fairy-wings"></div>
          <div class="head">
            <div class="eye left"></div>
            <div class="eye right"></div>
            <div class="smile"></div>
          </div>
          <div class="body"></div>
          <div class="arm arm-left"></div>
          <div class="arm arm-right"></div>
          <div class="leg leg-left"></div>
          <div class="leg leg-right"></div>
        </div>
      </div>

      <div class="question-box">
        <span class="label">Soal</span>
        <h2>7 + 5 = ?</h2>
        <p id="feedback-text">Pilih fase untuk memulai permainan.</p>
      </div>
    </section>

    <section class="answers">
      <button class="answer-btn" type="button">
        <span class="option">A</span>
        <span class="value">10</span>
      </button>

      <button class="answer-btn" type="button">
        <span class="option">B</span>
        <span class="value">11</span>
      </button>

      <button class="answer-btn" type="button">
        <span class="option">C</span>
        <span class="value">12</span>
      </button>

      <button class="answer-btn" type="button">
        <span class="option">D</span>
        <span class="value">13</span>
      </button>
    </section>

    <section class="card shop">
      <div class="shop-head">
        <div>
          <h3>Toko Hadiah</h3>
          <p>Tukar 50 skor untuk membeli kosmetik maskot.</p>
        </div>
        <div class="shop-balance">Skor aktif: <strong id="shop-score">120</strong></div>
      </div>

      <div class="shop-grid">
        <button class="shop-item" type="button" data-item="wizard-hat">
          <span class="shop-icon">🧙‍♀️</span>
          <strong>Topi Penyihir</strong>
          <span>50 skor</span>
        </button>

        <button class="shop-item" type="button" data-item="knight-sword">
          <span class="shop-icon">🗡️</span>
          <strong>Pedang Ksatria</strong>
          <span>50 skor</span>
        </button>

        <button class="shop-item" type="button" data-item="fairy-wings">
          <span class="shop-icon">🪽</span>
          <strong>Sayap Peri</strong>
          <span>50 skor</span>
        </button>
      </div>

      <p class="shop-status" id="shop-status">Belum ada hadiah yang dipakai.</p>
    </section>
  </main>

  <section class="game-over" id="game-over" aria-hidden="true">
    <div class="game-over-card">
      <h2>Game Over</h2>
      <p>Nyawa habis. Coba main lagi ya!</p>
      <button class="restart-btn" type="button" id="restart-btn">Main Lagi</button>
    </div>
  </section>

  <div class="confetti-layer" id="confetti-layer" aria-hidden="true"></div>

  <script src="script.js"></script>
</body>
</html>
